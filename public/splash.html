<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            
            background: rgba(15, 23, 42, 0.95);
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Tahoma", sans-serif;
            color: #ffffff;
            
            border-radius: 12px;
            overflow: hidden;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
        }

        h1 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2.5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="Logo" style="width: 64px; height: 64px; margin-bottom: 16px;">
    
    <h1>در حال بارگذاری نرم‌افزار</h1>
    <p>لطفا شکیبا باشید.</p>
    
    <div class="spinner"></div>
</body>
</html>
