name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/production/php-fpm/Dockerfile
          push: true
          tags: ghcr.io/jooyeshgar/freeamir-app:latest

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/production/nginx/Dockerfile
          push: true
          tags: ghcr.io/jooyeshgar/freeamir-nginx:latest

      - name: Build and push All in one image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/all-in-one/Dockerfile
          push: true
          tags: ghcr.io/jooyeshgar/freeamir-all-in-one:latest