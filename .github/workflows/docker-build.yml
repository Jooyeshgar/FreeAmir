name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # === 1. App ===
      - name: Extract metadata for App
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/jooyeshgar/freeamir-app
            hadi60/freeamir-app
          flavor: |
            latest=auto

      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/production/php-fpm/Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}

      # === 2. Nginx ===
      - name: Extract metadata for Nginx
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/jooyeshgar/freeamir-nginx
            hadi60/freeamir-nginx
          flavor: |
            latest=auto

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/production/nginx/Dockerfile
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}

      # === 3. All in one ===
      - name: Extract metadata for All in one
        id: meta-all-in-one
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/jooyeshgar/freeamir-all-in-one
            hadi60/freeamir-all-in-one
          flavor: |
            latest=auto

      - name: Build and push All in one image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/all-in-one/Dockerfile
          push: true
          tags: ${{ steps.meta-all-in-one.outputs.tags }}
          labels: ${{ steps.meta-all-in-one.outputs.labels }}