title: امیر
description: نرم‌افزار آزاد حسابداری لاراول برای کسب‌وکارهای ایرانی

theme: jekyll-theme-architect

plugins:
  - jekyll-readme-index

readme_index:
  enabled: enabled
  remove_originals: true

kramdown:
  parse_block_html: true

defaults:
  - scope:
      path: ""
    values:
      layout: default
