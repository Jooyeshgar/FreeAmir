; PHP-FPM pool configuration for FreeAmir production
; Overrides the default www pool settings

[www]
; Listen on all interfaces on port 9000
listen = 0.0.0.0:9000

; Enable /status endpoint required by php-fpm-healthcheck
pm.status_path = /status

; Process manager settings
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Pass environment variables through to PHP (required for Docker env vars)
clear_env = no

; Send FPM logs to stderr so Docker captures them
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Increase timeouts for long-running Artisan-initiated requests
request_terminate_timeout = 300
