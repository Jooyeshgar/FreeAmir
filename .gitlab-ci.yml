stages:
  - test
  - deploy_develop

cache:
  paths:
    - vendor/
    - node_modules/

test:
  stage: test
  before_script:
    - cp .env.ci .env
    - cp docker-composeci.yml docker-compose.yml
    - chmod -R 777 storage/
    - chmod -R 777 bootstrap/cache/
    - echo "DB_PASSWORD=$DB_PASSWORD" >> .env
    - composer install --no-scripts --ignore-platform-reqs
    - chmod -R 777 vendor/
    - ./vendor/bin/sail up -d --force-recreate --wait
    - ./vendor/bin/sail exec laravel.test git config --global --add safe.directory /var/www/html
    - ./vendor/bin/sail composer install
    # - ./vendor/bin/sail npm install --cache /var/www/html/.npm
    # - ./vendor/bin/sail npm run build
    # - ./vendor/bin/sail php artisan migrate:fresh

  script:
    - set +e
    - ./vendor/bin/sail php artisan test --colors=never
    - TEST_EXIT_CODE=$?
    - echo "Test Exit Code $TEST_EXIT_CODE"
    - if [ $TEST_EXIT_CODE -ne 0 ]; then exit $TEST_EXIT_CODE; fi
    - set -e
    
  after_script:
    - ./vendor/bin/sail down || true

deploy_develop:
  stage: deploy_develop
  when: manual
  only:
    - main
  before_script: []
  after_script: []
  script:
    - ./vendor/bin/envoy run deploy
