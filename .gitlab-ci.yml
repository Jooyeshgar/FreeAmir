stages:
  - test
  - deploy_develop

cache:
  paths:
    - vendor/
    - node_modules/
    - composer.phar

test:
  stage: test
  tags:
    - docker-runner
  
  image:
    name: ghcr.io/jooyeshgar/freeamir-app:latest
    pull_policy: if-not-present
    entrypoint: [""] 
  
  services:
    - name: mariadb:11
      alias: mariadb
      pull_policy: if-not-present

  variables:
    MARIADB_DATABASE: testing_db
    MARIADB_USER: test_user
    MARIADB_PASSWORD: test_password
    MARIADB_ROOT_PASSWORD: root_password
    
    DB_CONNECTION: mysql
    DB_HOST: mariadb
    DB_PORT: 3306
    DB_DATABASE: testing_db
    DB_USERNAME: test_user
    DB_PASSWORD: test_password

  before_script:
    - cp .env.ci .env
    - mkdir -p .composer
    
    - |
      if [ ! -f composer.phar ]; then
        echo "Downloading composer.phar directly..."
        php -r "copy('https://getcomposer.org/download/latest-stable/composer.phar', 'composer.phar');"
      else
        echo "Using cached composer.phar"
      fi

    - php composer.phar install --no-scripts --ignore-platform-reqs --no-interaction
    
    - php artisan key:generate --env=ci || true
    - php artisan config:clear
    - php artisan cache:clear
    - php artisan migrate:fresh

  script:
    - php artisan test --colors=never

deploy_develop:
  stage: deploy_develop
  when: manual
  only:
    - main

  before_script: []
  after_script: []
  script:
    - ./vendor/bin/envoy run deploy
