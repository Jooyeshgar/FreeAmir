stages:
  - test
  - deploy_develop

cache:
  paths:
    - vendor/
    - node_modules/
    - composer.phar

test:
  stage: test
  tags:
    - docker-runner
  
  image:
    name: ghcr.io/jooyeshgar/freeamir-app:latest
    pull_policy: if-not-present
    entrypoint: [""] 
  
  services:
    - name: mariadb:11
      alias: mariadb
      pull_policy: if-not-present

  variables:
    MARIADB_DATABASE: testing_db
    MARIADB_USER: test_user
    MARIADB_PASSWORD: test_password
    MARIADB_ROOT_PASSWORD: root_password
    
    DB_CONNECTION: mysql
    DB_HOST: mariadb
    DB_PORT: 3306
    DB_DATABASE: testing_db
    DB_USERNAME: test_user
    DB_PASSWORD: test_password

  before_script:
    - cp .env.ci .env
    - mkdir -p .composer
    
    - |
      if [ ! -f composer.phar ]; then
        echo "Downloading composer.phar directly..."
        php -r "copy('https://getcomposer.org/download/latest-stable/composer.phar', 'composer.phar');"
      else
        echo "Using cached composer.phar"
      fi

    - php composer.phar install --no-scripts --ignore-platform-reqs --no-interaction
    
    - |
      echo "Waiting for MariaDB..."
      for i in $(seq 1 30); do
        if php -r "try { new PDO('mysql:host=mariadb;port=3306', 'test_user', 'test_password'); echo 'OK'; exit(0); } catch(Exception \$e) { exit(1); }" 2>/dev/null; then
          echo "MariaDB is ready!"
          break
        fi
        echo "Attempt $i: waiting..."
        sleep 2
      done
    
    - php artisan key:generate --env=ci || true
    - php artisan cache:clear
    - export HOME=.
    - php artisan tinker --execute="echo 'DB_PASS=['.config('database.connections.mysql.password').']';"
    - php artisan tinker --execute="
        \$h = config('database.connections.mysql.host') ?? 'mariadb';
        \$u = 'test_user';
        \$p = 'test_password';
        try {
          new PDO('mysql:host=mariadb;port=3306;dbname=testing_db', \$u, \$p);
          echo 'Direct PDO= OK';
        } catch(Exception \$e) {
          echo 'Direct PDO FAILED= '.\$e->getMessage();
        }
      "


    # - php artisan migrate:fresh

  script:
    # - php artisan test --colors=never
    - php artisan cache:clear


deploy_develop:
  stage: deploy_develop
  when: manual
  only:
    - main

  before_script: []
  after_script: []
  script:
    - ./vendor/bin/envoy run deploy